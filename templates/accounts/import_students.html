{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">Import Students</h2>

<form method="post" enctype="multipart/form-data" class="card p-4 shadow-sm">
    {% csrf_token %}

    <div class="mb-3">
        <label>Department</label>
        <select id="department" class="form-select">
            <option value="">Select Department</option>
            {% for dept in departments %}
                <option value="{{ dept.id }}">{{ dept.name }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label>Program</label>
        <select id="program" class="form-select"></select>
    </div>

    <div class="mb-3">
        <label>Course</label>
        <select id="course" class="form-select"></select>
    </div>

    <div class="mb-3">
        <label>Class</label>
        <select id="class" class="form-select"></select>
    </div>

    <div class="mb-3">
        <label>Section</label>
        <select name="section" id="section" class="form-select" required></select>
    </div>

    <div class="mb-3">
        <label>Upload CSV File</label>
        <input type="file" name="csv_file" class="form-control" required>
    </div>

    <button type="submit" class="btn btn-primary w-100">
        Import Students
    </button>

</form>

{% endblock %}
