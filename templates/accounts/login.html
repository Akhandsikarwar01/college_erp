<h2>Login</h2>

<form method="post">
    {% csrf_token %}

    <label>Username / Mobile:</label>
    <input type="text" name="identifier" required>
    <br><br>

    <label>Password:</label>
    <input type="password" name="password" required>
    <br><br>

    <button type="submit">Login</button>
</form>

{% for message in messages %}
<p>{{ message }}</p>
{% endfor %}
