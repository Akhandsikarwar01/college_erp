{% extends "base.html" %}
{% block title %}Create Exam{% endblock %}
{% block topbar_title %}Create Exam{% endblock %}

{% block content %}
<div class="page-header fade-in-up">
    <div>
        <div class="page-header-title">Create New Exam</div>
        <div class="page-header-subtitle">Set up an examination event</div>
    </div>
</div>

<div class="card fade-in-up" style="max-width:640px">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">Exam Name</label>
                <input type="text" name="name" class="form-control" placeholder="e.g. Mid-Term Exam 2025" required>
            </div>
            <div class="form-group">
                <label class="form-label">Exam Type</label>
                <select name="exam_type" class="form-control form-select" required>
                    <option value="">Select type…</option>
                    {% for t in exam_types %}
                    <option value="{{ t.pk }}">{{ t.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Course</label>
                <select name="course" class="form-control form-select" required>
                    <option value="">Select course…</option>
                    {% for c in courses %}
                    <option value="{{ c.pk }}">{{ c.name }} ({{ c.program.department.code }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Semester</label>
                <select name="semester" class="form-control form-select" required>
                    <option value="">Select semester…</option>
                    {% for s in semesters %}
                    <option value="{{ s.pk }}">{{ s.course.name }} – Sem {{ s.number }}</option>
                    {% endfor %}
                </select>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
                <div class="form-group">
                    <label class="form-label">Start Date</label>
                    <input type="date" name="start_date" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label">End Date</label>
                    <input type="date" name="end_date" class="form-control" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-full" style="margin-top:.5rem">Create Exam</button>
        </form>
    </div>
</div>
{% endblock %}
