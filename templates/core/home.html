{% extends "base.html" %}
{% load static %}

{% block outer_content %}
<div class="home-hero">
  <div class="home-hero-inner fade-in-up">

    <div class="home-brand">College ERP</div>
    <div class="home-tagline">
      A unified platform for students, teachers, and administrators.<br>
      Attendance, academics, and insights — all in one place.
    </div>

    <div class="home-actions">
      <a href="{% url 'login' %}" class="btn btn-primary btn-lg">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
          <polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/>
        </svg>
        Sign In
      </a>
      <a href="{% url 'signup' %}" class="btn btn-outline btn-lg" style="color:#fff;border-color:rgba(255,255,255,.3);">
        Create Account
      </a>
    </div>

    <div style="margin-top:3rem;display:flex;gap:2rem;justify-content:center;color:var(--gray-500);font-size:.85rem;">
      <span>🎓 Student Attendance</span>
      <span>📋 Teacher Sessions</span>
      <span>🏫 Admin Analytics</span>
    </div>

  </div>
</div>
{% endblock %}
